<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM Tippspiel Klasse 3</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif; /* Friendly font for kids */
            background-color: #f0f8ff;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }

        /* Leaderboard Styles */
        .rangliste {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .kind-reihe {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 2px dashed #eee;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .punkte-badge {
            background-color: #ffd700; /* Gold */
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Match Results Styles */
        .spiel-auswertung {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .echtes-ergebnis {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #2ecc71; /* Green */
            color: white;
            border-radius: 10px;
        }

        .tipp-karte {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 1.1rem;
        }

        /* Colors based on points */
        .volltreffer { background-color: #d4edda; border: 2px solid #28a745; } /* Light Green */
        .richtiger-sieger { background-color: #cce5ff; border: 2px solid #007bff; } /* Light Blue */
        .daneben { background-color: #f8f9fa; border: 2px solid #ced4da; } /* Light Grey */

    </style>
</head>
<body>

    <h1>⚽ Unser WM Tippspiel ⚽</h1>

    <!-- SECTION 1: THE LEADERBOARD -->
    <div class="rangliste">
        <h2>🏆 Die Tabelle</h2>
        
        <div class="kind-reihe">
            <span>🥇 1. Mia</span>
            <span class="punkte-badge">6 Punkte</span>
        </div>
        <div class="kind-reihe">
            <span>🥈 2. Leon</span>
            <span class="punkte-badge">4 Punkte</span>
        </div>
        <div class="kind-reihe">
            <span>🥉 3. Emma</span>
            <span class="punkte-badge">3 Punkte</span>
        </div>
        <div class="kind-reihe">
            <span>🏅 4. Jonas</span>
            <span class="punkte-badge">1 Punkt</span>
        </div>
    </div>

    <!-- SECTION 2: HOW THEY VOTED ON A FINISHED GAME -->
    <div class="spiel-auswertung">
        <h2>Deutschland gegen Curaçao</h2>
        
        <div class="echtes-ergebnis">
            Echtes Ergebnis: 2 - 0
        </div>

        <!-- 3 Points Example -->
        <div class="tipp-karte volltreffer">
            <span><strong>Mia:</strong> Tippte 2 - 0</span>
            <span>🎯 3 Punkte!</span>
        </div>

        <!-- 1 Point Example -->
        <div class="tipp-karte richtiger-sieger">
            <span><strong>Leon:</strong> Tippte 3 - 1</span>
            <span>👍 1 Punkt</span>
        </div>

        <!-- 0 Points Example -->
        <div class="tipp-karte daneben">
            <span><strong>Jonas:</strong> Tippte 0 - 1</span>
            <span>⚽ 0 Punkte</span>
        </div>
    </div>

</body>
</html>
